# policy-secrets.yml — 機敏資訊掃描守門員(平台自身護欄)
#
# 目標:任何 PR / push 中若含寫死的密碼 / 金鑰 / Token,自動擋下,
#       不靠人工 review。偵測到即檢查 failed,PR 無法合併。
#
# 對應治理控制項:
#   - ISO 27001 A.8.12 資料外洩防護(金鑰不得進版控)── 核心
#   - ISO 27001 A.5.17 鑑別資訊(防止憑證外洩;見 COMPLIANCE_MAP.md)
#
# 設計:護欄而非閘門 ── 規則寫成程式碼自動執行,100% 覆蓋、即時、可稽核。
#       本檔屬「護欄」,變更需平台 + 資安群組審核(見 CODEOWNERS / SoD)。
#
# 稽核證據:每次執行的結果與 SARIF 報告以 artifact 形式保留(Actions log)。

name: policy-secrets

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

env:
  # 固定 gitleaks 版本以確保規則可重現、可稽核(避免規則隨上游漂移)。
  GITLEAKS_VERSION: "8.18.4"

jobs:
  secret-scan:
    # job name 即 required-status-check 的 context,故用穩定 ASCII 名稱
    # (對應 ISO 27001 A.8.12 / A.5.17,詳見檔頭與步驟說明)
    name: policy-secrets
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # 取得完整歷史,掃描所有提交

      - name: Install gitleaks (pinned)
        run: |
          set -euo pipefail
          url="https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"
          curl -sSL "$url" -o /tmp/gitleaks.tar.gz
          tar -xzf /tmp/gitleaks.tar.gz -C /tmp gitleaks
          sudo install -m 0755 /tmp/gitleaks /usr/local/bin/gitleaks
          gitleaks version

      # 掃描工作目錄(--no-git)以攔截 PR 中寫死的機敏資訊。
      # --exit-code 1:偵測到即以非零碼結束 → 檢查 failed → PR 無法合併。
      # --redact:報告中遮蔽實際值,避免證據檔本身外洩機敏資訊。
      - name: Run gitleaks scan
        run: |
          set -euo pipefail
          gitleaks detect \
            --source . \
            --no-git \
            --config .gitleaks.toml \
            --redact \
            --report-format sarif \
            --report-path gitleaks-report.sarif \
            --exit-code 1 \
            --verbose

      # 不論成敗都保留報告,作為可稽核的執行紀錄。
      - name: Upload scan report (audit evidence)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gitleaks-report
          path: gitleaks-report.sarif
          if-no-files-found: ignore
