# audit-report.yml — 稽核證據自動產出([TASK-07] 步驟 3:可定期 / 按需)
#
# 把 GitHub 技術紀錄翻譯成對應 ISO 控制項的合規證據報告。
#
# 對應治理控制項:
#   - ISO 27001 A.5.36 合規審查(自動證據)
#   - ISO 20000        服務報告(Service Reporting)
#
# 觸發:
#   - schedule:每月 1 號(定期月報)
#   - workflow_dispatch:平台 / 稽核可按需手動產生
#
# 產物:報告以 artifact 保留,供稽核下載(屬產出物,不進版控)。

name: audit-report

on:
  schedule:
    - cron: "0 0 1 * *"   # 每月 1 號 00:00 UTC
  workflow_dispatch:
    inputs:
      since:
        description: "起始日 YYYY-MM-DD(留空 = 30 天前)"
        required: false
      until:
        description: "結束日 YYYY-MM-DD(留空 = 今天)"
        required: false

# 報告產生器只需讀取 PR / Actions 紀錄。
permissions:
  contents: read
  actions: read
  pull-requests: read

jobs:
  generate:
    name: 產生稽核證據報告 (ISO 27001 A.5.36)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # PyYAML:讀 DeploymentRequest / CMDB 以產出「黃金路徑端到端證據鏈」一節(TASK-D7)。
      - name: Install PyYAML
        run: pip install pyyaml

      # gh CLI 在 GitHub runner 上已內建;用內建 GITHUB_TOKEN 認證即可。
      - name: Generate audit report
        env:
          GH_TOKEN: ${{ github.token }}
          SINCE: ${{ inputs.since }}
          UNTIL: ${{ inputs.until }}
        run: |
          set -euo pipefail
          args=(--repo "${GITHUB_REPOSITORY}" --output audit-report.md)
          [ -n "${SINCE}" ] && args+=(--since "${SINCE}")
          [ -n "${UNTIL}" ] && args+=(--until "${UNTIL}")
          python3 scripts/generate_audit_report.py "${args[@]}"

      - name: Upload audit report (evidence)
        uses: actions/upload-artifact@v4
        with:
          name: audit-report
          path: audit-report.md
