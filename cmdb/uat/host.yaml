# CMDB Configuration Item(CI)— 由 scripts/cmdb_register.py 於部署成功後產出。
# 多層拓樸:host(VM/宿主)→ middleware(OpenLiberty)→ software(app),以 ciId 互連。
# 版控史即組態基線與變更史。對應:ISO 20000 組態管理 / ISO 27001 A.8.9。請勿手改。
apiVersion: cmdb/v1
kind: ConfigurationItem
metadata:
  ciId: ci-host-uat
  type: host
  app: supply-chain-backend
  environment: uat
spec:
  attributes:
    kind: container host (podman)
    address: 127.0.0.1
    provisionedBy: OpenTofu
    iac: iac/environments/uat
    target: podman
  relationships:
  - type: provisioned-by
    target: iac/environments/uat
  - type: hosts
    target: ci-mw-supply-chain-backend-uat
