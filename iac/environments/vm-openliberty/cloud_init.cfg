#cloud-config
hostname: itops-ol-vm
# spike 階段:密碼登入方便驗證(正式應走 SSH key + 禁密碼)
ssh_pwauth: true
password: itops
chpasswd:
  expire: false
package_update: true
packages:
  - qemu-guest-agent
  - openjdk-17-jre-headless
runcmd:
  - systemctl enable --now qemu-guest-agent
  - echo "ITOPS-VM-READY $(date -u)" | tee /run/itops-marker
  - java -version 2>&1 | tee -a /run/itops-marker
