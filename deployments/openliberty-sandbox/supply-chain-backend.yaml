# DeploymentRequest — 部署請求即程式碼（範例，值皆為公開 PoC 假值）
# 對應：docs/golden-path-request-to-deploy.md、PROJECT_PLAN.md [TASK-D2]
# 這個檔由「服務請求 → PR」產生，是該次部署的變更紀錄與期望狀態。
apiVersion: golden-path/v1
kind: DeploymentRequest
metadata:
  app: supply-chain-backend
  environment: openliberty-sandbox
  serviceRequest: "#0"          # 連回服務請求 issue 編號（範例用 #0；實際填真實 issue 號）
  requestedBy: developer        # SoD：請求者角色（ISO 27001 A.5.3）
spec:
  source:
    artifact: ghcr.io/ryangtr/supply-chain-backend   # 範例假值
    version: v0.0.0-EXAMPLE                            # 範例假值
    digest: ""                                         # D4 簽章後回填 sha256:...
  dataClassification: internal   # 模擬分級（非真實機密分級）
  runtime:
    type: openliberty
    # 以下參數由 [TASK-D3] 的 OpenTofu openliberty-service 模組消費（預設安全）
    httpPort: 9080
    contextRoot: /
