# DeploymentRequest — 部署請求即程式碼（範例，值皆為公開 PoC 假值）
# 對應：docs/golden-path-request-to-deploy.md、PROJECT_PLAN.md [TASK-D2]
# 這個檔由「服務請求 → PR」產生，是該次部署的變更紀錄與期望狀態。
apiVersion: golden-path/v1
kind: DeploymentRequest
metadata:
  app: supply-chain-backend
  environment: openliberty-sandbox
  serviceRequest: "#0"          # 連回服務請求 issue 編號（範例用 #0；實際填真實 issue 號）
  requestedBy: developer        # SoD：請求者角色（ISO 27001 A.5.3）
  # 變更分類（TASK-E1）：標準變更＝預核准、走黃金路徑自動放行。
  # 例外型別 emergency/retroactive 需附 justification；插單填 expedite{by,reason}。
  changeType: standard          # standard|normal|emergency|retroactive
  priority: P3                  # P1..P4（P1 最急）
spec:
  source:
    artifact: localhost/supply-chain-backend           # D6 本機實跑:podman build 的真實映像
    version: d6                                         # 本次部署的版本 tag
    digest: "sha256:98a5ba98f42739af7dad598132ae90506bdc2bd2f0c2ec805d0d4d67735f3e7a"  # D4 簽章後回填(對應 sig/supply-chain-backend.sig)
    gitCommit: "def4567"                               # 血統:源碼 commit(範例值;真實由 D4 build 帶 github.sha)
    gitTag: "v0.0.0-EXAMPLE"                            # 發布 tag(範例值;部署釘 digest 不釘 tag)
    testReport: "sha256:0c025ecc8cc6c88e94b8338e34b161abb5d2d50627661a6006ea6bc4631f8d55"  # 測試證據指紋(範例值;真實=test job surefire 報告雜湊)
    testCount: 3                                        # 測試數(test gate:>=1;隨 digest 過版)
  dataClassification: internal   # 模擬分級（非真實機密分級）
  runtime:
    type: openliberty
    # 以下參數由 [TASK-D3] 的 OpenTofu openliberty-service 模組消費（預設安全）
    httpPort: 9080
    contextRoot: /
