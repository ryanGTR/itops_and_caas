# DeploymentRequest — test 環境（範例,公開 PoC 假值）— TASK-F1
# 多環境晉級:三區共用「同一個 digest」(build once, promote),差異只在下方 runtime config。
# 對應:docs/multi-env-promotion.md、docs/provenance-and-identifiers.md
apiVersion: golden-path/v1
kind: DeploymentRequest
metadata:
  app: supply-chain-backend
  environment: test
  serviceRequest: "#0"
  requestedBy: developer
  changeType: standard          # 過版到 test 的型別(prod 過版實務走 normal,需 CAB,見 Phase F)
  priority: P3
spec:
  source:                       # ★ 三區完全相同——同一個已驗章的產物
    artifact: localhost/supply-chain-backend
    version: b1
    digest: "sha256:707f88c2ef9be6f4001f93b494b8db2a7e0fb997a4e293f60f3cd4a8ac020b77"
    gitCommit: "def4567"        # 血統:源碼 commit(範例值;真實由 D4 build 帶入 github.sha)
    gitTag: "v0.0.0-EXAMPLE"    # 發布 tag(範例值;人用 tag 挑、系統用 digest 釘)
    testReport: "sha256:13c01fb542dc0f6728824f6e9f7a4c66e3e7f0b36dab75ad8cd42422dd414349"  # 測試證據指紋(隨 digest 過版)
    testCount: 3                # 測試數(test gate:>=1)
  dataClassification: internal     # 隨環境(prod 較高)
  runtime:                      # ★ 隨環境不同的 config(image 不變)
    type: openliberty
    httpPort: 9081
    contextRoot: /
